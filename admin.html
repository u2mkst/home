    <script>
        // 🔑 AES-256 개인키 대칭키 설정 (※ 학생 기기용 소스코드에도 동일한 키를 입력해야 서로 해독이 가능합니다.)
        const SECRET_KEY = "u2mkst!";

        // AES-256 암호화 함수
        function encryptAES(text) {
            if (!text) return "";
            return CryptoJS.AES.encrypt(text, SECRET_KEY).toString();
        }

        // AES-256 복호화 함수
        // 🔓 개선된 AES-256 복호화 함수 (웹 환경의 변형 요인 자동 보정)
function decryptAES(cipherText) {
    if (!cipherText) return "";
    try {
        // 1. 문자열 타입 보장 및 앞뒤 공백/줄바꿈 완벽 제거
        let cleanText = String(cipherText).trim();
        
        // 2. 데이터가 따옴표로 중복 감싸진 경우 제거 (Double Quoting 방지)
        if (cleanText.startsWith('"') && cleanText.endsWith('"')) {
            cleanText = cleanText.slice(1, -1);
        } else if (cleanText.startsWith("'") && cleanText.endsWith("'")) {
            cleanText = cleanText.slice(1, -1);
        }
        
        // 3. 웹 전송 중 '+' 기호가 공백(' ')으로 치환된 치명적 오류 원상복구
        cleanText = cleanText.replace(/ /g, '+');

        // 4. 복호화 실행
        const bytes = CryptoJS.AES.decrypt(cleanText, SECRET_KEY);
        const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
        
        // 복호화 성공 시 번역된 텍스트 반환, 실패 시 안전하게 원본 반환
        return decryptedText || cipherText;
    } catch (e) {
        console.error("복호화 진행 중 예외 발생:", e);
        return cipherText;
    }
}

        function fetchTeacherStudents(teacherName) {
            database.ref('students').orderByChild('teacher').equalTo(teacherName).on('value', (snapshot) => {
                allStudents = [];
                const data = snapshot.val();
                if (data) {
                    for (let id in data) {
                        allStudents.push({ id, ...data[id] });
                    }
                }
                filterStudents(); 
            });
        }

        function filterStudents() {
            const keyword = document.getElementById('studentSearchInput').value.trim().toLowerCase();
            const listZone = document.getElementById('studentListZone');
            
            if (!listZone) return;
            listZone.innerHTML = '';

            if (allStudents.length === 0) {
                listZone.innerHTML = '<div class="no-msg">등록된 담당 학생이 없습니다.</div>';
                return;
            }

            const filtered = allStudents.filter(student => {
                if (keyword === "") return true; 
                return student.name && student.name.toLowerCase().includes(keyword); 
            });

            if (filtered.length === 0) {
                listZone.innerHTML = '<div class="no-msg">일치하는 학생이 없습니다.</div>';
                return;
            }

            filtered.forEach(student => {
                const studentIdStr = student.u2mId ? student.u2mId : '없음';

                const item = document.createElement('div');
                item.className = 'student-item';
                item.innerHTML = `
                    <div class="student-info">
                        <span class="student-name">👤 ${student.name}</span>
                        <span class="student-id">ID: ${studentIdStr}</span>
                    </div>
                    <button class="btn-note" onclick="loadStudentChatRoom('${student.id}', '${student.name}')">💬 대화방</button>
                `;
                listZone.appendChild(item);
            });
        }

        function loadStudentChatRoom(studentUid, studentName) {
            currentSelectedStudentUid = studentUid;
            currentSelectedStudentName = studentName;
            document.getElementById('selectedStudentName').innerText = studentName;
            
            detachAdminChatListeners();

            let studentQuestions = [];
            let teacherReplies = [];

            const qRef = database.ref('messages').orderByChild('studentUid').equalTo(studentUid);
            adminChatListeners.push({ ref: qRef, type: 'value' });
            qRef.on('value', (snapshot) => {
                studentQuestions = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const val = child.val();
                        let decryptedMsg = decryptAES(val.message); // 🔓 복호화 반영
                        studentQuestions.push({ id: child.key, origin: 'student', ...val, message: decryptedMsg });
                        if (val.read === false) {
                            database.ref(`messages/${child.key}/read`).set(true);
                        }
                    });
                }
                renderAdminChatFeed(studentQuestions, teacherReplies);
            });

            const rRef = database.ref(`student_messages/${studentUid}`);
            adminChatListeners.push({ ref: rRef, type: 'value' });
            rRef.on('value', (snapshot) => {
                teacherReplies = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const val = child.val();
                        let decryptedMsg = decryptAES(val.message); // 🔓 복호화 반영
                        teacherReplies.push({ id: child.key, origin: 'teacher', ...val, message: decryptedMsg });
                    });
                }
                renderAdminChatFeed(studentQuestions, teacherReplies);
            });
        }

        function renderAdminChatFeed(questions, replies) {
            const zoneEl = document.getElementById('adminChatHistoryZone');
            if (!zoneEl) return;

            const totalChat = [...questions, ...replies];
            totalChat.sort((a, b) => a.timestamp - b.timestamp);

            if (totalChat.length === 0) {
                zoneEl.innerHTML = '<div class="chat-no-data"> 주고받은 대화가 없습니다. 첫 대화를 시작해 보세요!</div>';
                return;
            }

            zoneEl.innerHTML = '';

            totalChat.forEach(chat => {
                const date = new Date(chat.timestamp);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.width = '100%';

                let rawMessage = chat.message || "";
                if(rawMessage.startsWith("[답장완료] ")) {
                    rawMessage = rawMessage.replace("[답장완료] ", "");
                }

                if (chat.origin === 'student') {
                    wrapper.innerHTML = `
                        <span class="admin-chat-meta"><span class="chat-sender-name">👤 ${currentSelectedStudentName}</span> (${timeStr})</span>
                        <div class="admin-bubble student">${rawMessage}</div>
                    `;
                } else {
                    wrapper.innerHTML = `
                        <span class="admin-chat-meta teacher"><span class="chat-sender-name me">나 (${chat.teacher || '선생님'})</span> (${timeStr})</span>
                        <div class="admin-bubble teacher">${rawMessage}</div>
                    `;
                }
                zoneEl.appendChild(wrapper);
            });

            zoneEl.scrollTop = zoneEl.scrollHeight;
        }

        function sendTeacherReply() {
            const replyInput = document.getElementById('teacherReplyInput');
            const text = replyInput.value.trim();
            const teacherName = localStorage.getItem('admin_teacher') || "선생님";

            if (!currentSelectedStudentUid) {
                alert("대화방을 열기 위해 학생 목록에서 학생을 먼저 선택해 주세요.");
                return;
            }
            if (!text) return;

            const encryptedMessage = encryptAES(`[답장완료] ${text}`); // 🔒 암호화 전송

            const replyData = {
                teacher: teacherName,
                message: encryptedMessage,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                read: false
            };

            database.ref(`student_messages/${currentSelectedStudentUid}`).push(replyData)
                .then(() => {
                    replyInput.value = '';
                })
                .catch(err => alert("전송 실패: " + err.message));
        }

        function detachAdminChatListeners() {
            adminChatListeners.forEach(item => item.ref.off(item.type));
            adminChatListeners = [];
        }

        function resetChatRoomUI() {
            currentSelectedStudentUid = null;
            currentSelectedStudentName = "";
            const nameEl = document.getElementById('selectedStudentName');
            const zoneEl = document.getElementById('adminChatHistoryZone');
            if(nameEl) nameEl.innerText = "없음";
            if(zoneEl) zoneEl.innerHTML = '<div class="chat-no-data">위 학생 목록에서 [💬 대화방] 버튼을 누르면 대화 내역이 실시간 로드됩니다.</div>';
        }

        function listenToIncomingMessages(teacherName) {
            messageListener = database.ref('messages').on('value', (snapshot) => {
                const data = snapshot.val();
                let unreadCount = 0;
                const listEl = document.getElementById('modalMsgList');
                if (!listEl) return;
                listEl.innerHTML = '';

                if (data) {
                    const msgArray = [];
                    for (let id in data) {
                        if (data[id].teacher === teacherName) {
                            msgArray.push({ id, ...data[id] });
                        }
                    }
                    msgArray.sort((a, b) => b.timestamp - a.timestamp);

                    if(msgArray.length === 0) {
                        listEl.innerHTML = '<div class="no-msg">받은 메시지가 없습니다.</div>';
                    } else {
                        msgArray.forEach(msg => {
                            if (!msg.read) unreadCount++;

                            const date = new Date(msg.timestamp);
                            const timeStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                            
                            const msgStudentId = msg.u2mId ? msg.u2mId : '아이디 누락';
                            let decryptedMsg = decryptAES(msg.message); // 🔓 복호화 반영

                            const item = document.createElement('div');
                            item.className = `msg-item ${!msg.read ? 'unread' : ''}`;
                            item.innerHTML = `
                                <div class="msg-meta">
                                    <span class="msg-sender">👤 ${msg.studentName || '알수없음'} (${msgStudentId})</span>
                                    <span>${timeStr}</span>
                                </div>
                                <div class="msg-body">${decryptedMsg || ''}</div>
                                
                                <div class="reply-box">
                                    <button class="reply-toggle-btn" onclick="toggleReplyZone('${msg.id}')">↩️ 답장하기</button>
                                    
                                    <div class="reply-input-zone" id="replyZone-${msg.id}">
                                        <textarea class="reply-mini-textarea" id="replyInput-${msg.id}" rows="2" placeholder="학생에게 보낼 답장을 기입하세요."></textarea>
                                        <button class="reply-send-btn" onclick="sendReplyFromModal('${msg.id}', '${msg.studentUid}', '${msg.teacher}')">전송 및 저장</button>
                                    </div>
                                    
                                    <div class="history-list" id="history-${msg.id}" style="display:none;"></div>
                                </div>
                            `;
                            listEl.appendChild(item);
                            
                            listenToExistingReplies(msg.id);
                        });
                    }
                } else {
                    listEl.innerHTML = '<div class="no-msg">받은 메시지가 없습니다.</div>';
                }

                const badge = document.getElementById('msgBadgeCount');
                if (badge) {
                    if (unreadCount > 0) {
                        badge.innerText = unreadCount;
                        badge.style.display = 'block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            });
        }

        function toggleReplyZone(msgId) {
            const zone = document.getElementById(`replyZone-${msgId}`);
            zone.style.display = zone.style.display === 'block' ? 'none' : 'block';
        }

        function sendReplyFromModal(msgId, studentUid, teacherName) {
            const inputEl = document.getElementById(`replyInput-${msgId}`);
            const text = inputEl.value.trim();

            if (!text) {
                alert("답장 내용을 입력해 주세요.");
                return;
            }
            if (!studentUid || studentUid === "undefined") {
                alert("❌ 학생의 식별자(studentUid)를 찾을 수 없습니다.");
                return;
            }

            const timestamp = firebase.database.ServerValue.TIMESTAMP;
            const encryptedMessage = encryptAES(`[답장완료] ${text}`); // 🔒 암호화 전송
            const encryptedHistoryMessage = encryptAES(text);

            database.ref(`student_messages/${studentUid}`).push({
                teacher: teacherName,
                message: encryptedMessage,
                timestamp: timestamp,
                read: false
            })
            .then(() => {
                return database.ref(`messages/${msgId}/replies`).push({
                    teacher: teacherName,
                    message: encryptedHistoryMessage,
                    timestamp: timestamp
                });
            })
            .then(() => {
                alert("학생에게 답장이 전송되었으며 내역이 기록되었습니다.");
                inputEl.value = '';
                document.getElementById(`replyZone-${msgId}`).style.display = 'none';
            })
            .catch(err => alert("전송 실패: " + err.message));
        }

        function listenToExistingReplies(msgId) {
            database.ref(`messages/${msgId}/replies`).on('value', (snapshot) => {
                const historyContainer = document.getElementById(`history-${msgId}`);
                if (!historyContainer) return;
                historyContainer.innerHTML = '';

                if (!snapshot.exists()) {
                    historyContainer.style.display = 'none';
                    return;
                }

                historyContainer.style.display = 'block';
                snapshot.forEach((child) => {
                    const data = child.val();
                    const dateObj = new Date(data.timestamp);
                    const timeStr = `${String(dateObj.getHours()).padStart(2,'0')}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
                    
                    let decryptedReply = decryptAES(data.message); // 🔓 복호화 반영

                    const itemHtml = `
                        <div class="history-item">
                            <span class="history-teacher">└ ↩️ 내 답장:</span> ${decryptedReply} 
                            <span style="font-size:0.7rem; color:#aaa;">(${timeStr})</span>
                        </div>
                    `;
                    historyContainer.insertAdjacentHTML('beforeend', itemHtml);
                });
            });
        }

        function openMessageModal() {
            document.getElementById('messageModal').style.display = 'flex';
            const currentTeacher = localStorage.getItem('admin_teacher');
            
            database.ref('messages').once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    for(let id in data) {
                        if(data[id].teacher === currentTeacher && !data[id].read) {
                            database.ref(`messages/${id}/read`).set(true);
                        }
                    }
                }
            });
        }

        function closeMessageModal() {
            document.getElementById('messageModal').style.display = 'none';
        }

        function handleLogin() {
            const teacher = document.getElementById('adminTeacher').value;
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            if(!teacher) {
                alert("담당 선생님 이름을 먼저 선택해 주세요.");
                return;
            }
            if(!email || !password) {
                alert("이메일과 비밀번호를 모두 입력해주세요.");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    localStorage.setItem('admin_teacher', teacher);
                    localStorage.setItem('admin_email', email);
                    localStorage.setItem('admin_password', password);
                })
                .catch((error) => {
                    alert("❌ 인증 실패: " + error.message);
                });
        }

        function handleLogout() {
            if(confirm("안전을 위해 로그아웃 하시겠습니까?")) {
                auth.signOut().then(() => {
                    alert("정상적으로 로그아웃되었습니다.");
                });
            }
        }

        function resetTeacherConfig() {
            if(confirm("저장된 선생님 설정과 자동 로그인 정보를 모두 삭제하고 다시 선택하시겠습니까?")) {
                clearLocalStorageAuth();
                auth.signOut().then(() => {
                    document.getElementById('adminTeacher').value = "";
                    document.getElementById('adminEmail').value = "";
                    document.getElementById('adminPassword').value = "";
                    alert("초기화되었습니다. 새로운 선생님 정보를 입력하세요.");
                });
            }
        }

        function clearLocalStorageAuth() {
            localStorage.removeItem('admin_teacher');
            localStorage.removeItem('admin_email');
            localStorage.removeItem('admin_password');
        }

        function publishData(path, inputId) {
            let val = document.getElementById(inputId).value;
            if (path === 'notice') {
                val = encryptAES(val); // 🔒 공지사항 발송 시 자동으로 암호화 처리 적용
            }
            database.ref(path).set(val);
            alert("전송 완료! 모든 태블릿에 실시간 반영되었습니다.");
        }
        
        function clearData(path, inputId) {
            document.getElementById(inputId).value = "";
            database.ref(path).remove();
            alert("원격 전송을 중단했습니다.");
        }

        // 페이지 로드 시 기존 데이터를 정상적으로 복호화하여 매핑
        function loadCurrentStatus() {
            database.ref('notice').once('value', s => { 
                if(s.val()) document.getElementById('noticeInput').value = decryptAES(s.val()); // 🔓 공지사항 원본 복호화 로드
            });
            database.ref('reminder').once('value', s => { 
                if(s.val()) document.getElementById('reminderInput').value = s.val(); 
            });
        }
    </script>
</body>
</html>
