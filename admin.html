<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 태블릿 제어 by KST</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500; font-display: swap;
        }

        body { 
            font-family: 'Paperozi', 'Noto Sans KR', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%), linear-gradient(25deg, #ecd5e3 0%, #cee5f2 60%, #e2daf0 100%);
            background-blend-mode: multiply;
            margin: 0; 
            padding: 24px 16px; 
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 430px;
        }

        .header-zone {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-zone h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            margin: 0 0 6px 0;
            letter-spacing: -1px;
        }

        .header-zone p {
            color: #6c5ce7;
            margin: 0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .card { 
            background: rgba(255, 255, 255, 0.55); 
            padding: 22px 20px; 
            border-radius: 20px; 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 25px rgba(149, 157, 165, 0.04);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        h2 { 
            margin-top: 0; 
            color: #2c3e50; 
            font-size: 1.1rem; 
            font-weight: bold;
            margin-bottom: 16px;
            border-bottom: 1px dashed rgba(108, 92, 231, 0.3);
            padding-bottom: 8px;
        }
        
        textarea, input[type="text"], input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 14px; 
            box-sizing: border-box; 
            margin-bottom: 12px; 
            font-size: 0.95rem; 
            font-family: inherit;
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
            transition: all 0.2s ease;
        }

        textarea:focus, input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #6c5ce7;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        button { 
            display: block;
            background-color: rgba(255, 255, 255, 0.9); 
            color: #333333;
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 15px 20px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.95rem;
            width: 100%; 
            margin-bottom: 10px; 
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(149, 157, 165, 0.06);
            transition: all 0.2s ease;
        }

        button:hover { 
            background-color: #6c5ce7; 
            color: #ffffff; 
            border-color: #6c5ce7;
        }
        button:active { transform: scale(0.98); }

        .btn-delete { color: #d63031; margin-bottom: 0; }
        .btn-delete:hover { background-color: #d63031; color: #fff; border-color: #d63031; }
        
        .btn-logout { background-color: transparent; color: #7f8c8d; border: none; box-shadow: none; font-size: 0.85rem; padding: 5px; margin-top: 10px;}
        .btn-logout:hover { background-color: rgba(0,0,0,0.05); color: #333; }

        label {
            display: block;
            font-weight: bold;
            font-size: 0.85rem;
            color: #4a5568;
            margin-bottom: 6px;
        }

        /* 초기 상태 제어 및 컴포넌트 은닉 */
        #loginCard { display: none; }
        #controlPanel { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-zone">
            <h1>학생 태블릿 제어</h1>
            <p>by KST</p>
        </div>

        <div id="loginCard" class="card">
            <h2>🔒 관리자 계정 인증</h2>
            <label>이메일 주소</label>
            <input type="email" id="adminEmail" placeholder="example@u2m.com">
            
            <label>비밀번호</label>
            <input type="password" id="adminPassword" placeholder="비밀번호 입력" onkeyup="if(window.event.keyCode==13){handleLogin()}">
            
            <button onclick="handleLogin()">보안 로그인</button>
        </div>

        <div id="controlPanel">
            <div class="card">
                <h2>🔔 전체 화면 강제 팝업</h2>
                <label>공지할 내용을 작성해 주세요</label>
                <textarea id="noticeInput" rows="4" placeholder="텍스트를 적고 전송하면 모든 학생용 태블릿 정중앙에 팝업창이 나타납니다. 내용을 비우고 전송하면 팝업이 닫힙니다."></textarea>
                <button onclick="publishData('notice', 'noticeInput')">⚡ 즉시 팝업 전송</button>
            </div>

            <div class="card">
                <h2>🤫 하단 리마인더 자막 방송</h2>
                <label>화면 밑에 흘려보낼 메시지</label>
                <input type="text" id="reminderInput" placeholder="예시) 소곤소곤 잡담 엄금! 즉시 퇴실 조치">
                <button onclick="publishData('reminder', 'reminderInput')">⚡ 자막 전송 / 갱신</button>
                <button class="btn-delete" onclick="clearData('reminder', 'reminderInput')">✖ 자막 방송 끄기</button>
            </div>
            
            <button class="btn-logout" onclick="handleLogout()">로그아웃 (세션 종료)</button>
        </div>
    </div>

    <script>
        // ⚠️ Firebase 설정 정보 입력 (본인의 키값으로 꼭 채워넣으세요!)
        const firebaseConfig = {

  apiKey: "AIzaSyD-F55blgdfzEygJ9-OUEqw22_EHKOhggg",

  authDomain: "ksthome-76889.firebaseapp.com",

  databaseURL: "https://ksthome-76889-default-rtdb.firebaseio.com",

  projectId: "ksthome-76889",

  storageBucket: "ksthome-76889.firebasestorage.app",

  messagingSenderId: "411945142173",

  appId: "1:411945142173:web:c6fdb499040b2a5a4f9174",

  measurementId: "G-72TJ0364MJ"

};
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const database = firebase.database();

        // 인증 상태 실시간 모니터링 (자동 로그인 및 페이지 세션 방어)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // 로그인 완료 상태
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('controlPanel').style.display = 'block';
                loadCurrentStatus();
            } else {
                // 로그아웃 혹은 비인증 상태
                document.getElementById('controlPanel').style.display = 'none';
                document.getElementById('loginCard').style.display = 'block';
            }
        });

        // 로그인 실행 함수
        function handleLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            if(!email || !password) {
                alert("이메일과 비밀번호를 모두 입력해주세요.");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .catch((error) => {
                    alert("❌ 인증 실패: " + error.message);
                });
        }

        // 로그아웃 실행 함수
        function handleLogout() {
            if(confirm("안전을 위해 로그아웃 하시겠습니까?")) {
                auth.signOut().then(() => {
                    alert("정상적으로 로그아웃되었습니다.");
                });
            }
        }

        // 실시간 전송 처리 함수
        function publishData(path, inputId) {
            const val = document.getElementById(inputId).value;
            database.ref(path).set(val);
            alert("전송 완료! 모든 태블릿에 실시간 반영되었습니다.");
        }
        
        // 데이터 초기화(끄기) 함수
        function clearData(path, inputId) {
            document.getElementById(inputId).value = "";
            database.ref(path).remove();
            alert("원격 전송을 중단했습니다.");
        }

        // DB 현재 상황 데이터 노드 연동
        function loadCurrentStatus() {
            database.ref('notice').once('value', s => { if(s.val()) document.getElementById('noticeInput').value = s.val(); });
            database.ref('reminder').once('value', s => { if(s.val()) document.getElementById('reminderInput').value = s.val(); });
        }
    </script>
</body>
</html>
