<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>K&P 수학입시학원 관리자</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500; font-display: swap;
        }

        body { 
            font-family: 'Paperozi', 'Noto Sans KR', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            margin: 0; padding: 20px; color: #333;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 800px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; font-weight: 700; }
        .card { 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; 
        }
        h2 { margin-top: 0; color: #34495e; font-size: 1.3rem; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        
        input[type="text"], input[type="email"], input[type="password"], textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            box-sizing: border-box; font-size: 1rem; font-family: inherit;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { 
            flex: 1; padding: 12px; border: none; border-radius: 8px; 
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-publish { background-color: #2ecc71; color: white; }
        .btn-publish:hover { background-color: #27ae60; }
        .btn-clear { background-color: #e74c3c; color: white; }
        .btn-clear:hover { background-color: #c0392b; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        .control-group { margin-bottom: 25px; padding: 15px; background: #f9f9f9; border-radius: 10px; }
        #adminSection { display: none; }
        .status-badge {
            display: inline-block; padding: 5px 10px; border-radius: 20px;
            font-size: 0.85rem; font-weight: bold; margin-top: 5px;
        }
        .status-success { background: #e8f8f5; color: #1abc9c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>K&P 수학입시학원 관리자 시스템</h1>
        
        <div id="loginSection" class="card">
            <h2>🔐 관리자 인증 및 선생님 설정</h2>
            <div class="form-group">
                <label for="adminTeacher">👨‍🏫 담당 선생님 선택</label>
                <select id="adminTeacher">
                    <option value="">-- 선생님을 선택하세요 --</option>
                    <option value="김민우">김민우 선생님</option>
                    <option value="박진아">박진아 선생님</option>
                    <option value="이태성">이태성 선생님</option>
                </select>
            </div>
            <div class="form-group">
                <label for="adminEmail">📧 이메일 주소</label>
                <input type="email" id="adminEmail" placeholder="example@kst.com">
            </div>
            <div class="form-group">
                <label for="adminPassword">🔒 비밀번호</label>
                <input type="password" id="adminPassword" placeholder="비밀번호 입력">
            </div>
            <button class="btn btn-primary" onclick="handleAdminLogin()">설정 저장 및 로그인</button>
        </div>

        <div id="adminSection">
            <div class="card">
                <h2 style="display: flex; justify-content: space-between; align-items: center;">
                    <span>🎛️ 실시간 원격 제어 대시보드</span>
                    <span id="teacherBadge" class="status-badge status-success">선생님</span>
                </h2>
                <button class="btn btn-secondary" onclick="resetTeacherConfig()" style="margin-bottom: 15px;">🔄 설정 초기화 (다른 선생님으로 로그인)</button>
            </div>

            <div class="card">
                <h2>📢 실시간 원격 공지 & 알림 전송</h2>
                
                <div class="control-group">
                    <label for="noticeInput">📌 상단 대형 공지사항 (notice) - 🔒 자동 암호화 전송</label>
                    <textarea id="noticeInput" placeholder="모든 태블릿 화면 중앙에 표시될 공지내용을 입력하세요..."></textarea>
                    <div class="btn-group">
                        <button class="btn btn-publish" data-path="notice" data-input="noticeInput">공지 전송</button>
                        <button class="btn btn-clear" data-path="notice" data-input="noticeInput">공지 삭제</button>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="reminderInput">⚠️ 하단 흐르는 알림 바 (reminder) - 📄 평문 전송</label>
                    <input type="text" id="reminderInput" placeholder="하단에 전광판처럼 흐르게 할 긴급 메시지를 입력하세요...">
                    <div class="btn-group">
                        <button class="btn btn-publish" data-path="reminder" data-input="reminderInput">알림 바 전송</button>
                        <button class="btn btn-clear" data-path="reminder" data-input="reminderInput">알림 바 삭제</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 본인의 파이어베이스 설정을 여기에 복사해 넣으세요.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // 🔒 index.html의 SECRET_KEY인 "u2mkst!"와 100% 일치시킴
        const SECRET_KEY = "u2mkst!";

        // AES-256 암호화 함수
        function encryptAES(text) {
            if (!text) return "";
            return CryptoJS.AES.encrypt(text, SECRET_KEY).toString();
        }

        // AES-256 복호화 함수
        function decryptAES(cipherText) {
            if (!cipherText) return "";
            try {
                const bytes = CryptoJS.AES.decrypt(cipherText, SECRET_KEY);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                if (!decrypted) return cipherText; 
                return decrypted;
            } catch (e) {
                console.error("AES Decryption Error:", e);
                return cipherText;
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedTeacher = localStorage.getItem('admin_teacher');
            const savedEmail = localStorage.getItem('admin_email');
            const savedPassword = localStorage.getItem('admin_password');

            if (savedTeacher && savedEmail && savedPassword) {
                document.getElementById('adminTeacher').value = savedTeacher;
                document.getElementById('adminEmail').value = savedEmail;
                document.getElementById('adminPassword').value = savedPassword;
                
                auth.signInWithEmailAndPassword(savedEmail, savedPassword)
                    .then(() => {
                        showAdminPanel(savedTeacher);
                    })
                    .catch(() => {
                        clearLocalStorageAuth();
                    });
            }
        });

        function handleAdminLogin() {
            const teacher = document.getElementById('adminTeacher').value;
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if (!teacher || !email || !password) {
                alert("선생님 선택 및 로그인 정보를 모두 입력해주세요.");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    localStorage.setItem('admin_teacher', teacher);
                    localStorage.setItem('admin_email', email);
                    localStorage.setItem('admin_password', password);
                    showAdminPanel(teacher);
                })
                .catch((error) => {
                    alert("로그인 실패: " + error.message);
                });
        }

        function showAdminPanel(teacherName) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('teacherBadge').innerText = `👨‍🏫 ${teacherName} 선생님 제어 중`;
            loadCurrentStatus();
        }

        function resetTeacherConfig() {
            if(confirm("저장된 선생님 설정과 자동 로그인 정보를 모두 삭제하고 다시 선택하시겠습니까?")) {
                clearLocalStorageAuth();
                auth.signOut().then(() => {
                    document.getElementById('adminTeacher').value = "";
                    document.getElementById('adminEmail').value = "";
                    document.getElementById('adminPassword').value = "";
                    document.getElementById('loginSection').style.display = 'block';
                    document.getElementById('adminSection').style.display = 'none';
                    alert("초기화되었습니다. 새로운 선생님 정보를 입력하세요.");
                });
            }
        }

        function clearLocalStorageAuth() {
            localStorage.removeItem('admin_teacher');
            localStorage.removeItem('admin_email');
            localStorage.removeItem('admin_password');
        }

        function publishData(path, inputId) {
            let val = document.getElementById(inputId).value;
            
            // 🔒 학생용 패널 구조에 맞춰 'notice'만 암호화하여 전송합니다.
            if (path === 'notice') {
                val = encryptAES(val);
            }
            
            database.ref(path).set(val)
                .then(() => {
                    alert("전송 완료! 모든 태블릿에 실시간 반영되었습니다.");
                })
                .catch((error) => {
                    alert("전송 실패: " + error.message);
                });
        }
        
        function clearData(path, inputId) {
            document.getElementById(inputId).value = "";
            database.ref(path).remove()
                .then(() => {
                    alert("원격 전송을 중단했습니다.");
                })
                .catch((error) => {
                    alert("삭제 실패: " + error.message);
                });
        }

        function loadCurrentStatus() {
            // notice 데이터 로드 시 복호화 후 창에 표시
            database.ref('notice').once('value', s => { 
                if(s.val()) document.getElementById('noticeInput').value = decryptAES(s.val()); 
            });
            // reminder 데이터는 평문이므로 그대로 표시
            database.ref('reminder').once('value', s => { 
                if(s.val()) document.getElementById('reminderInput').value = s.val(); 
            });
        }

        document.body.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-publish')) {
                const path = e.target.getAttribute('data-path');
                const inputId = e.target.getAttribute('data-input');
                publishData(path, inputId);
            } else if (e.target.classList.contains('btn-clear')) {
                const path = e.target.getAttribute('data-path');
                const inputId = e.target.getAttribute('data-input');
                clearData(path, inputId);
            }
        });
    </script>
</body>
</html>
