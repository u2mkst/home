                 K&P 수학입시학원 학생 관리 서비스(이하 '서비스')는 이용자의 개인정보를 중요하게 생각하며, 「개인정보 보호법」 등 관련 법령을 준수합니다. 본 서비스는 회원가입 시 아래와 같이 최소한의 개인정보를 수집하며, 수집된 정보는 명시된 목적 외의 용도로는 절대 사용되지 않습니다.

1. 수집하는 개인정보의 항목

- 자동 수집 항목: 서비스 이용 기록, 접속 로그, 쿠키, 접속 IP 정보

2. 개인정보의 수집 및 이용 목적
- 회원 가입 및 본인 확인, 부정이용 방지
- 학원 학습 사이트(유투엠, 매쓰플랫 등) 연동 지원 및 학생 맞춤형 학습 관리 서비스 제공
- 학원-학생 간의 실시간 대화 및 공지사항 전달

3. 개인정보의 보유 및 이용 기간
- 이용자의 개인정보는 원칙적으로 서비스 회원 탈퇴 시 또는 학원 퇴원 시까지 보유하며, 목적이 달성된 후에는 지체 없이 파기합니다.
- 단, 관계 법령의 규정에 의하여 보존할 필요가 있는 경우, 법령에서 정한 일정 기간 동안 회원 정보를 보관합니다.

4. 개인정보의 파기 절차 및 방법
- 파기 대상: 보유 기간이 경과하거나 목적이 달성된 개인정보
- 파기 방법: 전자적 파일 형태의 정보는 기록을 재생할 수 없는 기술적 방법을 사용하여 삭제합니다.

5. 이용자의 권리
- 이용자(및 만 14세 미만 아동의 경우 법정대리인)는 언제든지 자신의 개인정보를 열람, 정정하거나 삭제(회원탈퇴)를 요청할 수 있습니다.



[이용약관]

제1조 (목적)
본 약관은 K&P 수학입시학원(이하 '학원')이 제공하는 학생 관리 서비스(이하 '서비스')의 이용 조건 및 절차, 학원과 회원의 권리, 의무 및 책임 사항을 규정함을 목적으로 합니다.

제2조 (용어의 정의)
1. '회원'이란 본 약관에 동의하고 서비스에 가입하여 학원이 제공하는 서비스를 이용하는 학생 사용자를 말합니다.
2. '유투엠 ID'란 서비스 연동 및 본인 식별을 위해 회원이 입력한 고유 정보입니다.

제3조 (약관의 효력 및 변경)
1. 본 약관은 서비스 화면에 게시하거나 기타의 방법으로 회원에게 공지함으로써 효력이 발생합니다.
2. 학원은 필요하다고 인정되는 경우 관계 법령을 위배하지 않는 범위 내에서 약관을 변경할 수 있으며, 변경된 약관은 서비스 내에 공지합니다.

제4조 (회원의 의무)
1. 회원은 가입 신청 시 실명으로 정확한 정보를 입력해야 하며, 타인의 정보(유투엠 ID 등)를 도용해서는 안 됩니다.
2. 회원은 본인의 계정 및 비밀번호(부모님 번호 뒷자리 등)를 안전하게 관리해야 하며, 제3자에게 대여하거나 유출해서는 안 됩니다.
3. 서비스 이용 중 알게 된 학원의 교육 콘텐츠 및 타인의 개인정보를 외부로 무단 유출하거나 악용해서는 안 됩니다.

제5조 (서비스의 제공 및 제한)
1. 서비스는 학원의 운영 방침 및 시스템 점검, 천재지변 등 불가피한 사유가 있는 경우 일시적으로 중단되거나 변경될 수 있습니다.
2. 회원이 본 약관의 의무를 위반하거나 학원 운영을 방해하는 경우, 학원은 회원의 서비스 이용을 제한하거나 강제 탈퇴 조치를 취할 수 있습니다.

제6조 (면책 조항)
1. 학원은 천재지변, 디도스(DDoS) 공격, 통신사 장애 등 불가항력적인 사유로 서비스를 제공할 수 없는 경우 책임이 면제됩니다.
2. 회원의 귀책사유로 인한 서비스 이용 장애나 계정 유출에 대해서는 학원이 책임을 지지 않습니다.

제7조 (관할 법원)
서비스 이용과 관련하여 학원과 회원 간에 발생한 분쟁에 대해서는 학원 소재지를 관할하는 법원을 합의 관할 법원으로 합니다. </textarea>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-F55blgdfzEygJ9-OUEqw22_EHKOhggg",
            authDomain: "ksthome-76889.firebaseapp.com",
            databaseURL: "https://ksthome-76889-default-rtdb.firebaseio.com",

            messagingSenderId: "411945142173",
            appId: "1:411945142173:web:c6fdb499040b2a5a4f9174",
            measurementId: "G-72TJ0364MJ"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // 🔒 [보안 중요] AES-256용 공통 비밀키 (외부 유출 주의)
        const SECRET_SALT = "u2mkst!";
        
        // 🔑 나이스 오픈 API 인증 키
        const NEIS_API_KEY = "19f78fd07bfb4243a6333e7bf4641bfc";

        // 🏫 나이스 API 연동: 실시간 학교 실시간 검색 및 자동완성 엔진
        const schoolInput = document.getElementById('registerSchool');
        const schoolList = document.getElementById('schoolList');
        const schoolCodeInput = document.getElementById('registerSchoolCode');

        schoolInput.addEventListener('input', function() {
    const query = this.value.trim();
    
    if (query.length < 2) {
        schoolList.innerHTML = '';
        schoolList.classList.add('hidden');
        schoolCodeInput.value = '';
        return;
    }

    const url = `https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&pIndex=1&pSize=20&SCHUL_NM=${encodeURIComponent(query)}`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            schoolList.innerHTML = '';

            if (data.schoolInfo && data.schoolInfo[1] && data.schoolInfo[1].row) {
                const rows = data.schoolInfo[1].row;
                schoolList.classList.remove('hidden');

                rows.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    
                    // 🌟 item.LCTN_NM 대신 item.ATPT_OFCDC_SC_NM 으로 변경하여 교육청 명칭이 정확히 뜹니다.
                    div.innerHTML = `${item.SCHUL_NM} <span class="school-region">${item.ATPT_OFCDC_SC_NM}</span>`;
                    
                    div.addEventListener('click', () => {
                        schoolInput.value = item.SCHUL_NM;
                        schoolCodeInput.value = item.SD_SCHUL_CODE;
                        schoolList.innerHTML = '';
                        schoolList.classList.add('hidden');
                    });
                    schoolList.appendChild(div);
                });
            } else {
                schoolList.classList.add('hidden');
            }
        })
        .catch(err => {
            console.error("나이스 API 로딩 오류:", err);
        });
});

        // 자동완성 켜진 상태에서 바깥 공간 터치/클릭 시 닫히도록 예외 처리
        document.addEventListener('click', function(e) {
            if (e.target !== schoolInput && e.target !== schoolList) {
                schoolList.innerHTML = '';
                schoolList.classList.add('hidden');
            }
        });


        function toggleMode(mode) {
            if(mode === 'register') {
                document.getElementById('loginCard').classList.add('hidden');
                document.getElementById('registerCard').classList.remove('hidden');
            } else {
                document.getElementById('registerCard').classList.add('hidden');
                document.getElementById('loginCard').classList.remove('hidden');
            }
        }

        function handleStudentRegister(e) {
            e.preventDefault();
            const studentName = document.getElementById('registerName').value.trim();
            const u2mId = document.getElementById('registerId').value.trim().toLowerCase();
            const phoneTail = document.getElementById('registerParentPhone').value.trim();
            const schoolName = schoolInput.value.trim();
            const schoolCode = schoolCodeInput.value.trim();
            const selectedTeacher = document.getElementById('registerTeacher').value;
            const isAgreed = document.getElementById('registerAgreement').checked;

            if (!u2mId.startsWith('ufes') || u2mId.length < 6) {
                alert('⚠️ 올바른 유투엠 아이디 형식이 아닙니다!\n아이디는 반드시 ufes로 시작해야 합니다.');
                return;
            }

            if (!/^\d{4}$/.test(phoneTail)) {
                alert('부모님 전화번호 뒷자리는 숫자 4자리로 입력해주세요.');
                return;
            }

            // 🏫 검색창에 타이핑만 하고 리스트에서 정확히 선택하지 않은 경우 방어코드
            if (!schoolName || !schoolCode) {
                alert('⚠️ 소속 학교를 입력한 후, 반드시 자동완성 리스트에서 우리 학교를 터치(선택)해 주세요.');
                return;
            }

            if (!selectedTeacher) {
                alert('담당 선생님을 선택해 주세요.');
                return;
            }

            if (!isAgreed) {
                alert('이용약관 및 개인정보처리방침에 동의하셔야 회원가입이 가능합니다.');
                return;
            }

            const studentEmail = u2mId + "@kst.com"; 
            const studentPassword = "00" + phoneTail; 

            // 🔒 [보안 강화] 입력된 개인정보를 데이터베이스 저장 직전 AES-256 암호화
            const encryptedName = CryptoJS.AES.encrypt(studentName, SECRET_SALT).toString();
            const encryptedPhoneTail = CryptoJS.AES.encrypt(phoneTail, SECRET_SALT).toString();

            auth.createUserWithEmailAndPassword(studentEmail, studentPassword)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    return user.updateProfile({
                        displayName: studentName 
                    }).then(() => {
                        // Realtime Database에 학교 이름과 나이스 학교 코드를 함께 규격 전송합니다.
                        return database.ref('students/' + user.uid).set({
                            name: encryptedName,                  // 🔒 암호화
                            u2mId: u2mId,                         // 식별 및 대조용 ID
                            schoolName: schoolName,               // 🏫 나이스 공식 학교명
                            schoolCode: schoolCode,               // 🧬 표준 학교 고유 코드 (D-day 계산기 등에 활용)
                            teacher: selectedTeacher,             // 배정용 선생님 명
                            phone: encryptedPhoneTail,            // 🔒 암호화
                            joinedAt: firebase.database.ServerValue.TIMESTAMP
                        });
                    });
                })
                .then(() => {
                    alert('🎉 회원가입이 완료되었습니다!\n유투엠 아이디와 비밀번호로 로그인해 주세요.');
                    document.getElementById('registerAgreement').checked = false;
                    toggleMode('login');
                    document.getElementById('loginId').value = u2mId;
                })
                .catch((error) => {
                    if(error.code === "auth/email-already-in-use") {
                        alert("이미 등록된 유투엠 아이디입니다.");
                    } else {
                        alert('회원가입 실패: ' + error.message);
                    }
                });
        }

        function handleStudentLogin(e) {
            e.preventDefault();
            const u2mId = document.getElementById('loginId').value.trim().toLowerCase();
            const phoneTail = document.getElementById('loginPassword').value.trim();

            const studentEmail = u2mId.includes('@') ? u2mId : u2mId + "@kst.com";
            const studentPassword = "00" + phoneTail;

            auth.signInWithEmailAndPassword(studentEmail, studentPassword)
                .then((userCredential) => {
                    const u2mId = studentEmail.split('@')[0];
                    localStorage.setItem('u2m_id', u2mId);
                    localStorage.setItem('u2m_pw', studentPassword);
                    window.location.href = './index.html'; 
                })
                .catch((error) => {
                    alert("로그인에 실패했습니다: " + error.message);
                });
        }
    </script>
</body>
</html>
