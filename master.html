<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&P 수학입시학원 총관리자</title>
    
    <!-- Firebase 라이브러리 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- 복호화 암호 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        @font-face {
            font-family: 'Paperlogy';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500; 
            font-display: swap;
        }
        
        body {
            font-family: 'Paperlogy', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%), 
                        linear-gradient(25deg, #ecd5e3 0%, #cee5f2 60%, #e2daf0 100%);
            background-blend-mode: multiply; 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            color: #333; 
            box-sizing: border-box;
            padding-bottom: 40px;
        }
        
        .container { 
            width: 100%; 
            max-width: 430px; 
            padding: 24px 20px; 
            box-sizing: border-box; 
        }
        
        /* 상단 타이틀 스타일 */
        .admin-title {
            font-size: 1.35rem; 
            font-weight: bold; 
            color: #2c3e50;
            margin-bottom: 8px;
            text-align: center;
            word-break: keep-all;
        }
        .admin-subtitle {
            font-size: 0.85rem;
            color: #6c5ce7;
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* 반투명 카드 공통 스타일 (홈페이지 스타일 계승) */
        .panel-card {
            background: rgba(255, 255, 255, 0.45);
            padding: 20px 16px; 
            border-radius: 20px; 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.06);
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .panel-card h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 1.05rem;
            color: #2c3e50;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 입력 폼 제어 */
        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            padding-left: 2px;
        }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            font-size: 0.9rem;
            box-sizing: border-box;
            color: #333;
        }
        .form-control:focus {
            outline: none;
            border-color: #6c5ce7;
            background: #ffffff;
        }
        textarea.form-control { resize: none; }

        /* 버튼 컴포넌트 */
        .btn-block {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 10px;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.1s ease;
        }
        .btn-block:active { transform: scale(0.98); }
        
        .btn-purple { background-color: #6c5ce7; color: white; }
        .btn-green { background-color: #00b894; color: white; }
        .btn-orange { background-color: #ff9f43; color: white; }
        .btn-red { background-color: #e74c3c; color: white; }
        .btn-gray { background-color: #cbd5e1; color: #4a5568; }

        .btn-group-flex { display: flex; gap: 8px; margin-top: 10px; }
        .btn-group-flex .btn-block { margin-bottom: 0; padding: 10px; font-size: 0.85rem; }

        /* 수신된 문의/제안 아이템 리스트 */
        .feed-container { display: flex; flex-direction: column; gap: 14px; }
        .feed-item {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 14px;
            padding: 14px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .feed-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .badge-inquiry { background-color: #e1dbff; color: #5b4cc4; }
        .badge-suggest { background-color: #d1fae5; color: #00a383; }

        .feed-meta { font-size: 0.78rem; color: #718096; margin-bottom: 6px; }
        .feed-meta b { color: #2c3e50; }
        .feed-body { font-size: 0.88rem; color: #2d3748; line-height: 1.45; white-space: pre-wrap; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #edf2f7; margin-bottom: 8px; }
        .feed-sub { font-size: 0.78rem; color: #4a5568; font-style: italic; margin-bottom: 10px; }

        .no-data { text-align: center; color: #a0aec0; padding: 30px 0; font-size: 0.85rem; }

        /* 하단 로그아웃 버튼 링크 */
        .bottom-logout-btn {
            background: none; border: none; color: #a0aec0; font-size: 0.8rem; 
            font-family: inherit; font-weight: 600; cursor: pointer; text-decoration: underline; margin-top: 15px;
        }

        /* 섹션 제어 오버레이 토글 */
        #login-view { display: block; }
        #admin-view { display: none; }

        /* 명언 등록 팝업 모달 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: #ffffff; width: 88%; max-width: 360px; padding: 22px;
            border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 🔐 1. 원장님 로그인 화면 뷰 -->
        <div id="login-view" class="panel-card" style="margin-top: 40px; text-align: center;">
            <div class="admin-title">K&P 수학입시학원</div>
            <div class="admin-subtitle">총관리자 인증</div>
            
            <div class="form-group">
                <label for="admin-email">관리자 이메일 주소</label>
                <input type="email" id="admin-email" class="form-control" placeholder="example@email.com">
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
                <label for="admin-password">비밀번호</label>
                <input type="password" id="admin-password" class="form-control" placeholder="••••••••">
            </div>
            
            <button class="btn-block btn-purple" onclick="handleAdminLogin()">원장님 로그인</button>
        </div>


        <!-- 👑 2. 로그인 성공 시 노출되는 원장님 관리자 패널 뷰 -->
        <div id="admin-view">
            <div class="admin-title">총 관리센터</div>
            <div id="welcome-bar" class="admin-subtitle">실시간 원격 제어 연결됨</div>

            <!-- 가. 실시간 홈 배너 제어 카드 -->
            <div class="panel-card">
                <h3>📢 메인 팝업 공지 및 전광판</h3>
                
                <div class="form-group">
                    <label for="input-notice">학생 메인 공지사항 (비우면 팝업 숨김)</label>
                    <textarea id="input-notice" class="form-control" rows="3" placeholder="학원 휴강 정보나 주요 일정을 적어주세요."></textarea>
                </div>
                <button class="btn-block btn-purple" onclick="saveNoticeData()">공지사항 즉시 배포</button>
                
                <div style="height: 12px;"></div>
                
                <div class="form-group">
                    <label for="input-reminder">하단 흐르는 긴급 전광판 문구 (비우면 숨김)</label>
                    <input type="text" id="input-reminder" class="form-control" placeholder="텍스트가 좌측으로 흐르게 됩니다.">
                </div>
                <button class="btn-block btn-orange" onclick="saveReminderData()">전광판 배너 적용</button>
            </div>

            <!-- 나. 오늘의 명언 수동 강제 설정 카드 -->
            <div class="panel-card">
                <h3>💡 오늘의 명언 직접 등록</h3>
                
                <div class="form-group">
                    <label for="quote-date">적용 대상 날짜</label>
                    <input type="date" id="quote-date" class="form-control">
                </div>
                <div class="form-group">
                    <label for="quote-message">명언 문구(한마디 내용)</label>
                    <textarea id="quote-message" class="form-control" rows="2" placeholder="기억에 남기고 싶은 문구를 적어주세요."></textarea>
                </div>
                <div class="form-group">
                    <label for="quote-author">말한 사람 (이름)</label>
                    <input type="text" id="quote-author" class="form-control" placeholder="예: 아인슈타인, 3학년 홍길동 등">
                </div>
                <div class="form-group" style="margin-bottom: 18px;">
                    <label for="quote-profile">말한 사람 설명 (직업 또는 신분)</label>
                    <input type="text" id="quote-profile" class="form-control" placeholder="예: 물리학자, 수성고 졸업생 등 (생략 가능)">
                </div>
                
                <button class="btn-block btn-green" onclick="saveManualQuoteData()">선택 일자 명언으로 강제 배포</button>
            </div>

            <!-- 다. 학생 문의/제안 수신 보관함 -->
            <div class="panel-card">
                <h3>📬 실시간 알림 수신함</h3>
                <div id="feed-container-list" class="feed-container">
                    <div class="no-data">수신 대기 중인 문의 사항이 없습니다.</div>
                </div>
            </div>

            <!-- 라. 로그아웃 제어 트랙 -->
            <div style="text-align: center;">
                <button class="bottom-logout-btn" onclick="handleAdminLogout()">관리자 모드 로그아웃</button>
            </div>
        </div>

    </div>

    <!-- 명언 배포 날짜 브릿지 매핑용 미니 팝업 모달 -->
    <div id="publishDateModal" class="modal-overlay">
        <div class="modal-box">
            <h4 style="margin-top: 0; color: #00b894; font-size: 1.05rem;">💡 제안 명언 배포 날짜 선택</h4>
            <p style="font-size: 0.8rem; color: #666; line-height: 1.4;">학생이 제안한 문구를 확정하여 등록합니다. 배포를 원하시는 날짜를 선택해 주세요.</p>
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="modal-target-date">명언 게시 날짜</label>
                <input type="date" id="modal-target-date" class="form-control">
            </div>
            <div class="btn-group-flex">
                <button class="btn-block btn-gray" onclick="closePublishModal()">취소</button>
                <button class="btn-block btn-green" onclick="commitStudentQuoteToMain()">게시하기</button>
            </div>
        </div>
    </div>

    <script>
        const SECRET_KEY = "u2mkst!";
        
        // 학생 메인 페이지와 완벽 조율된 파이어베이스 연동 객체
        const firebaseConfig = {
            apiKey: "AIzaSyD-F55blgdfzEygJ9-OUEqw22_EHKOhggg",
            authDomain: "ksthome-76889.firebaseapp.com",
            databaseURL: "https://ksthome-76889-default-rtdb.firebaseio.com",
            projectId: "ksthome-76889",
            storageBucket: "ksthome-76889.firebasestorage.app",
            messagingSenderId: "411945142173",
            appId: "1:411945142173:web:c6fdb499040b2a5a4f9174",
            measurementId: "G-72TJ0364MJ"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let targetQuoteCache = null; // 학생 제안 임시 보관 객체

        // 학생 암호화 문자열 실시간 해독기 복제
        function decryptAES(cipherText) {
            if (!cipherText) return "";
            try {
                const cleanCipherText = cipherText.toString().trim();
                if (!cleanCipherText.startsWith("U2FsdGVkX1")) return cleanCipherText;
                const bytes = CryptoJS.AES.decrypt(cleanCipherText, SECRET_KEY);
                return bytes.toString(CryptoJS.enc.Utf8) || cleanCipherText; 
            } catch (e) {
                console.error("🚨 복호화 실패:", e);
                return cipherText; 
            }
        }

        // Firebase Auth 인증 상태 흐름 제어 감지기
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                document.getElementById('welcome-bar').innerText = `${user.email} 원장님 계정 연결중`;
                
                // 기본 날짜 양식에 오늘 일자 디폴트 입력 채우기
                document.getElementById('quote-date').value = new Date().toISOString().substring(0, 10);
                
                // 실시간 리스너 및 기존 폼 기본값 트리거 정렬
                initAdminDataFeed();
            } else {
                document.getElementById('login-view').style.display = 'block';
                document.getElementById('admin-view').style.display = 'none';
            }
        });

        // 원장님 회원 가입/로그인 처리부
        function handleAdminLogin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();

            if (!email || !password) { alert("이메일과 패스워드를 입력하세요."); return; }

            auth.signInWithEmailAndPassword(email, password)
                .catch(err => {
                    alert("원장님 인증 실패: " + err.message + "\n등록된 관리자 계정 정보인지 다시 확인 바랍니다.");
                });
        }

        function handleAdminLogout() {
            if(confirm("관리자 센터에서 세션을 종료하고 로그아웃 하시겠습니까?")) {
                auth.signOut().then(() => alert("로그아웃 완료."));
            }
        }

        // 데이터베이스 통합 조회 초기화 및 동기화 처리
        function initAdminDataFeed() {
            // 1. 기존 메인화면 공지사항 및 리마인더 전광판 설정값 백업 패치
            database.ref('notice').once('value', (snapshot) => {
                if(snapshot.exists()) document.getElementById('input-notice').value = snapshot.val();
            });
            database.ref('reminder').once('value', (snapshot) => {
                if(snapshot.exists()) document.getElementById('input-reminder').value = snapshot.val();
            });

            // 2. 실시간 제안 및 문의 수신함 스트리밍 리스너 가동
            database.ref('suggestions').orderByChild('timestamp').on('value', (snapshot) => {
                const listContainer = document.getElementById('feed-container-list');
                listContainer.innerHTML = '';

                if (!snapshot.exists()) {
                    listContainer.innerHTML = '<div class="no-data">수신된 알림 내역이 비어 있습니다.</div>';
                    return;
                }

                let itemsHTML = [];

                snapshot.forEach((child) => {
                    const key = child.key;
                    const val = child.val();

                    // 각 파트 데이터 안전 복호화 이관
                    const realContent = decryptAES(val.content);
                    const realAuthor = val.author ? decryptAES(val.author) : "";
                    const realProfile = val.authorProfile ? decryptAES(val.authorProfile) : "";

                    const isSuggestion = (val.category === "오늘의 한마디 제안");
                    const badgeClass = isSuggestion ? "badge-suggest" : "badge-inquiry";
                    const badgeText = isSuggestion ? "💡 오늘의 한마디 제안" : "🏫 학원 문의사항";

                    let subInfoRow = '';
                    if (isSuggestion) {
                        const profileString = realProfile ? ` (${realProfile})` : "";
                        subInfoRow = `<div class="feed-sub">말한 사람: <b>${realAuthor}</b>${profileString}</div>`;
                    }

                    let commandButtons = `<button class="btn-block btn-red" onclick="deleteFeedItem('${key}')">기록 삭제</button>`;
                    if (isSuggestion) {
                        commandButtons = `
                            <button class="btn-block btn-green" onclick="openPublishBridgeModal('${key}', '${realContent.replace(/'/g, "\\'")}', '${realAuthor.replace(/'/g, "\\'")}', '${realProfile.replace(/'/g, "\\'")}')">명언 게시</button>
                            ${commandButtons}
                        `;
                    }

                    const template = `
                        <div class="feed-item">
                            <div class="feed-badge ${badgeClass}">${badgeText}</div>
                            <div class="feed-meta">학생: <b>${val.studentName}</b> (${val.schoolName || '미기정'})</div>
                            <div class="feed-body">${realContent}</div>
                            ${subInfoRow}
                            <div class="btn-group-flex">
                                ${commandButtons}
                            </div>
                        </div>
                    `;
                    itemsHTML.unshift(template); // 역순 배치 (최신 등록 글 최상단 배치)
                });

                listContainer.innerHTML = itemsHTML.join('');
            });
        }

        // 공지사항 파트 배포 및 삭제 처리 단두대
        function saveNoticeData() {
            const txt = document.getElementById('input-notice').value.trim();
            database.ref('notice').set(txt)
                .then(() => alert("전체 학생 홈 메인에 공지사항 팝업이 적용되었습니다."))
                .catch(err => alert("에러: " + err.message));
        }

        function saveReminderData() {
            const txt = document.getElementById('input-reminder').value.trim();
            database.ref('reminder').set(txt)
                .then(() => alert("하단 흐르는 긴급 띠 배너가 업데이트되었습니다."))
                .catch(err => alert("에러: " + err.message));
        }

        // 수동 명언 강제 바인딩 처리
        function saveManualQuoteData() {
            const date = document.getElementById('quote-date').value;
            const message = document.getElementById('quote-message').value.trim();
            const author = document.getElementById('quote-author').value.trim();
            const profile = document.getElementById('quote-profile').value.trim();

            if (!date || !message || !author) { alert("적용 날짜, 내용, 한마디 한 사람을 필수로 기입해 주세요."); return; }

            // 학생단 연계 구조 맞춤 동기화 패키징
            database.ref(`dailyQuotes/${date}`).set({
                message: message,
                author: author,
                authorProfile: profile || "-"
            }).then(() => {
                alert(`${date} 일자 수동 명언 지정 등록 성공!`);
                document.getElementById('quote-message').value = '';
                document.getElementById('quote-author').value = '';
                document.getElementById('quote-profile').value = '';
            }).catch(err => alert("배포 오류: " + err.message));
        }

        // 알림 메시지 삭제 소거기
        function deleteFeedItem(key) {
            if (confirm("해당 건을 수신 보관함에서 완전히 삭제처리 할까요?")) {
                database.ref(`suggestions/${key}`).remove()
                    .then(() => alert("삭제되었습니다."))
                    .catch(err => alert("실패: " + err.message));
            }
        }

        // 학생 제안 기반 명언 게시 가교 모달 제어
        function openPublishBridgeModal(id, content, author, profile) {
            targetQuoteCache = { id, content, author, profile };
            document.getElementById('modal-target-date').value = new Date().toISOString().substring(0, 10);
            document.getElementById('publishDateModal').style.display = 'flex';
        }

        function closePublishModal() {
            document.getElementById('publishDateModal').style.display = 'none';
            targetQuoteCache = null;
        }

        function commitStudentQuoteToMain() {
            const selectedDate = document.getElementById('modal-target-date').value;
            if(!selectedDate) { alert("날짜를 명확히 정해 주세요."); return; }
            if(!targetQuoteCache) return;

            database.ref(`dailyQuotes/${selectedDate}`).set({
                message: targetQuoteCache.content,
                author: targetQuoteCache.author,
                authorProfile: targetQuoteCache.profile || "-"
            }).then(() => {
                alert(`${selectedDate} 일자 메인 홈 오늘의 명언으로 매핑 게시 완료!`);
                closePublishModal();
            }).catch(err => alert("게시 에러: " + err.message));
        }
    </script>
</body>
</html>
