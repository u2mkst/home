<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&P 수학입시학원</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500; font-display: swap;
        }
        body {
            font-family: 'Paperozi', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%), linear-gradient(25deg, #ecd5e3 0%, #cee5f2 60%, #e2daf0 100%);
            background-blend-mode: multiply; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #333; overflow-x: hidden; padding-bottom: 50px;
        }
        .container { width: 100%; max-width: 430px; padding: 20px 24px; text-align: center; box-sizing: border-box; }
        
        /* ✨ 환영 인사 */
        .welcome-text {
            font-size: 1.4rem; font-weight: bold; color: #2c3e50;
            margin-bottom: 20px; display: inline-block; width: 100%; 
            box-sizing: border-box; word-break: keep-all;
        }

        /* 🕒 시계 컨테이너 */
        .clock-container {
            margin-bottom: 25px; background: rgba(255, 255, 255, 0.4);
            padding: 12px; border-radius: 20px; backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }
        .clock-date { font-size: 0.85rem; color: #6c5ce7; font-weight: 600; margin-bottom: 2px; }
        .clock-time { font-size: 2rem; font-weight: 700; color: #2c3e50; letter-spacing: -1px; }

        .link-button {
            display: block; background-color: rgba(255, 255, 255, 0.9); color: #333333;
            text-decoration: none; padding: 18px 20px; margin-bottom: 16px; border-radius: 16px;
            font-size: 1.05rem; font-weight: 600; box-shadow: 0 8px 16px rgba(149, 157, 165, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .link-button:hover { transform: translateY(-4px); background-color: #6c5ce7; color: #ffffff; border-color: #6c5ce7; }
        
        .quote-box {
            background: rgba(255, 255, 255, 0.5); padding: 18px; border-radius: 16px;
            margin-top: 20px; font-size: 0.95rem; color: #4a5568; line-height: 1.5;
            border: 1px dashed rgba(108, 92, 231, 0.3); word-break: keep-all;
        }
        .quote-author { display: block; margin-top: 8px; font-size: 0.85rem; color: #718096; font-weight: bold; }
        .more-links { display: inline-block; margin-top: 35px; font-size: 0.82rem; color: #6c5ce7; text-decoration: none; font-weight: 600; }
        .footer { margin-top: 15px; font-size: 0.85rem; color: #8892b0; }
        
        /* 🔴 하단 메뉴 링크 그룹 */
        .bottom-menu { margin-top: 15px; display: flex; justify-content: center; gap: 15px; }
        .bottom-link {
            font-size: 0.8rem; color: #b2bec3; text-decoration: none; 
            cursor: pointer; background: none; border: none; padding: 0; font-family: inherit;
        }
        .bottom-link:hover { color: #6c5ce7; text-decoration: underline; }
        .bottom-link.danger:hover { color: #e74c3c; }

        /* 🗂️ 모달 기본 디자인 (공지/쪽지 공용) */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: #ffffff; width: 90%; max-width: 380px; padding: 30px 24px;
            border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15); box-sizing: border-box;
        }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: #6c5ce7; margin-bottom: 15px; }
        .modal-content { font-size: 1rem; color: #4a5568; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; word-break: break-all; }
        .modal-btn { background-color: #6c5ce7; color: #ffffff; border: none; padding: 12px 30px; font-size: 0.95rem; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; }
        
        /* 쪽지 발송 전용 폼 요소 스타일 */
        .modal-box textarea {
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 14px;
            box-sizing: border-box; margin-bottom: 15px; font-size: 0.95rem; font-family: inherit;
            resize: none; background: #f8f9fa;
        }
        .modal-box textarea:focus { outline: none; border-color: #6c5ce7; background: #fff; }
        .btn-flex-group { display: flex; gap: 8px; }
        .btn-cancel { background-color: #e2e8f0; color: #4a5568; width: 100%; border: none; padding: 12px 0; font-size: 0.95rem; font-weight: 600; border-radius: 12px; cursor: pointer; }
        .btn-cancel:hover { background-color: #cbd5e1; }

        /* ✉️ 우측 하단 플로팅 메시지 버튼 */
        .msg-fab {
            position: fixed; bottom: 25px; right: 25px;
            width: 60px; height: 60px; border-radius: 50%;
            background-color: #6c5ce7; color: white; border: none;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
            cursor: pointer; display: none; justify-content: center; align-items: center;
            font-size: 1.6rem; z-index: 999; transition: all 0.2s ease;
        }
        .msg-fab:hover { transform: scale(1.08); background-color: #5b4cc4; }

        /* 자막 자습실 알림 바 */
        .marquee-container {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(44, 62, 80, 0.95); color: #fff; padding: 10px 0;
            font-size: 0.9rem; font-weight: 600; overflow: hidden; z-index: 999;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1); backdrop-filter: blur(5px);
        }
        .marquee-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: marquee linear infinite; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="welcome-message" class="welcome-text">학생 정보를 불러오는 중...</div>

        <div class="clock-container">
            <div id="clock-date" class="clock-date">0월 0일 0요일</div>
            <div id="clock-time" class="clock-time">00:00:00</div>
        </div>

        <a href="https://www.u2math.co.kr/Login/Index" target="_blank" class="link-button">유투엠 바로가기</a>
        <a href="https://student.mathflat.com/login" class="link-button">매쓰플랫 바로가기</a>
                            
        <div class="quote-box">
            💡 <b id="quote-header">오늘의 한마디:</b><br>
            <span id="quote-text">문구를 불러오는 중...</span>
            <span id="quote-author" class="quote-author"></span>
        </div>

        <a href="https://litt.ly/theu2m" target="_blank" class="more-links">KST가 만든 더 많은 것들</a>
        <div class="footer">© 2026 KST</div>
        
        <div class="bottom-menu">
            <button onclick="logoutUser()" class="bottom-link">로그아웃</button>
            <button onclick="deleteAccount()" class="bottom-link danger">계정삭제</button>
        </div>
    </div>

    <button id="msgFabBtn" class="msg-fab" onclick="openSendMessageModal()">✉️</button>

    <div id="sendMsgModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">✉️ 선생님께 메시지 전송</div>
            <textarea id="studentMsgInput" rows="4" placeholder="담당 선생님께 질문이나 요청사항을 실시간으로 적어주세요."></textarea>
            <div class="btn-flex-group">
                <button class="btn-cancel" onclick="closeSendMessageModal()">취소</button>
                <button class="modal-btn" onclick="sendMessageToTeacher()">보내기</button>
            </div>
        </div>
    </div>

    <div id="noticeModal" class="modal-overlay">
        <div class="modal-box">
            <div id="modalTitle" class="modal-title">📢 안내 말씀 드립니다</div>
            <div id="modalNoticeContent" class="modal-content">공지사항을 불러오는 중...</div>
            <button class="modal-btn" onclick="document.getElementById('noticeModal').style.display='none'">확인</button>
        </div>
    </div>

    <div id="reminderBar" class="marquee-container">
        <div id="reminderText" class="marquee-text"></div>
    </div>

    <script>
        let currentStudentData = null; 
        let noteListener = null;

        function startClock() {
            const dateEl = document.getElementById('clock-date');
            const timeEl = document.getElementById('clock-time');
            const weekDays = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            setInterval(() => {
                const now = new Date();
                dateEl.innerText = `${now.getMonth() + 1}월 ${now.getDate()}일 ${weekDays[now.getDay()]}`;
                timeEl.innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            }, 1000);
        }

        const advices = [
            { author: "빌 게이츠", authorProfile: "마이크로소프트 창업자", message: "인생이란 결코 공평하지 않다. 이 사실에 익숙해져라." },
            { author: "김애란", authorProfile: "소설가", message: "두근두근 내 인생은 그렇게 지나간다." },
            { author: "알베르트 아인슈타인", authorProfile: "물리학자", message: "한 번도 실수를 해보지 않은 사람은 한 번도 새로운 것을 시도한 적이 없는 사람이다." },
            { author: "스티브 잡스", authorProfile: "애플 창업자", message: "여정 그 자체의 과정이 곧 보상이다." },
            { author: "헨리 포드", authorProfile: "자동차 기업가", message: "할 수 있다고 생각하든 할 수 없다고 생각하든, 당신의 생각대로 될 것이다." }
        ];

        function displayDefaultAdvice() {
            const randomIndex = Math.floor(Math.random() * advices.length);
            const dailyData = advices[randomIndex];
            
            document.getElementById('quote-header').innerText = "오늘의 한마디:";
            document.getElementById('quote-text').innerText = `"${dailyData.message}"`;
            const profileStr = dailyData.authorProfile && dailyData.authorProfile !== "-" ? ` (${dailyData.authorProfile})` : "";
            document.getElementById('quote-author').innerText = `- ${dailyData.author}${profileStr} -`;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD-F55blgdfzEygJ9-OUEqw22_EHKOhggg",
            authDomain: "ksthome-76889.firebaseapp.com",
            databaseURL: "https://ksthome-76889-default-rtdb.firebaseio.com",
            projectId: "ksthome-76889",
            storageBucket: "ksthome-76889.firebasestorage.app",
            messagingSenderId: "411945142173",
            appId: "1:411945142173:web:c6fdb499040b2a5a4f9174",
            measurementId: "G-72TJ0364MJ"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // 🔒 로그인 상태를 감시하여 비로그인 시 즉시 login.html로 강제 이동
        function checkUserAuth() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // 로그인이 확실히 되어 있는 경우에만 UI 요소를 보여주고 데이터를 로드합니다.
                    document.getElementById('msgFabBtn').style.display = 'flex';

                    database.ref(`students/${user.uid}`).once('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            currentStudentData = data;
                            const actualName = data.name || data.studentName || data.userName || user.displayName || "학생";
                            document.getElementById('welcome-message').innerText = `${actualName}님 반가워요!`;
                        } else {
                            // 계정은 있으나 DB에 데이터가 아직 안 넘어온 특수 상황 예외처리
                            const studentName = user.displayName || "학생";
                            document.getElementById('welcome-message').innerText = `${studentName}님 반가워요!`;
                        }
                    });
                    
                    // 선생님 쪽지 감시 시작
                    listenToTeacherNotes(user.uid);
                } else {
                    // 🚨 [핵심] 로그인이 안 되어 있다면 국물도 없이 바로 로그인 페이지로 이동!
                    console.log("비로그인 사용자 감지 - 로그인 페이지로 강제 리다이렉트");
                    window.location.replace('login.html'); 
                    // 💡 window.location.href 대신 replace를 쓰면 
                    // 로그인 페이지로 간 뒤 브라우저 [뒤로가기]를 눌러도 다시 이 화면으로 넘어오지 못하게 완전히 막아버립니다.
                }
            });
        }

        // 🚪 로그아웃 기능
        function logoutUser() {
            if (confirm("로그아웃 하시겠습니까?")) {
                auth.signOut().then(() => {
                    localStorage.removeItem('u2m_id');
                    localStorage.removeItem('u2m_pw');
                    window.location.href = 'login.html';
                }).catch((error) => {
                    alert("로그아웃 중 오류가 발생했습니다: " + error.message);
                });
            }
        }

        function openSendMessageModal() {
            document.getElementById('studentMsgInput').value = '';
            document.getElementById('sendMsgModal').style.display = 'flex';
        }
        
        function closeSendMessageModal() {
            document.getElementById('sendMsgModal').style.display = 'none';
        }

        function listenToTeacherNotes(uid) {
            noteListener = database.ref(`student_messages/${uid}`).orderByChild('read').equalTo(false).limitToLast(1);
            noteListener.on('child_added', (snapshot) => {
                const note = snapshot.val();
                if (note) {
                    document.getElementById('modalTitle').innerText = "✉️ 선생님이 보낸 쪽지";
                    document.getElementById('modalNoticeContent').innerText = `[${note.teacher} 선생님]\n\n${note.message}`;
                    document.getElementById('noticeModal').style.display = 'flex';
                    
                    database.ref(`student_messages/${uid}/${snapshot.key}/read`).set(true);
                }
            });
        }

        function sendMessageToTeacher() {
            const msgInput = document.getElementById('studentMsgInput');
            const text = msgInput.value.trim();

            if (!text) {
                alert('보낼 내용을 입력해 주세요.');
                return;
            }
            if (!currentStudentData || !currentStudentData.teacher) {
                alert('담당 선생님 정보가 등록되지 않아 메시지를 보낼 수 없습니다.');
                return;
            }

            const msgData = {
                studentName: currentStudentData.name,
                teacher: currentStudentData.teacher,
                message: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                read: false
            };

            database.ref('messages').push(msgData)
                .then(() => {
                    alert(`${currentStudentData.teacher} 선생님께 메시지가 전송되었습니다.`);
                    closeSendMessageModal();
                })
                .catch(err => alert('전송 실패: ' + err.message));
        }

        function deleteAccount() {
            const user = auth.currentUser;
            
            if (!user) {
                alert("로그인된 정보가 없습니다. 다시 로그인해 주세요.");
                window.location.href = 'login.html';
                return;
            }

            const inputPhone = prompt("보안 및 회원탈퇴를 위해 등록된 핸드폰 번호 뒷자리 4글자를 입력해 주세요.");
            if (!inputPhone) return;

            if (inputPhone.length !== 4 || isNaN(inputPhone)) {
                alert("❌ 올바른 4자리 숫자를 입력해 주세요.");
                return;
            }

            if (currentStudentData && currentStudentData.phone) {
                const registeredPhone = currentStudentData.phone.toString();
                const lastFourDigits = registeredPhone.slice(-4);
                if (inputPhone !== lastFourDigits) {
                    alert("❌ 번호가 일치하지 않습니다. 다시 확인해 주세요.");
                    return;
                }
            }

            if (confirm("정말로 회원탈퇴를 진행하시겠습니까?\n탈퇴 시 데이터베이스와 로그인 계정이 복구 불가능하게 영구 소멸합니다.")) {
                const uid = user.uid;
                
                user.delete()
                    .then(() => {
                        return database.ref(`students/${uid}`).remove()
                            .then(() => database.ref(`student_messages/${uid}`).remove());
                    })
                    .then(() => {
                        localStorage.removeItem('u2m_id');
                        localStorage.removeItem('u2m_pw');
                        alert("회원탈퇴가 정상적으로 완료되었습니다. 이용해 주셔서 감사합니다.");
                        window.location.href = 'login.html';
                    })
                    .catch((error) => {
                        console.error("탈퇴 처리 중 오류 발생:", error);
                        if (error.code === 'auth/requires-recent-login') {
                            alert("🔒 보안을 위해 인증 세션이 만료되었습니다.\n\n안전한 탈퇴를 위해 [확인]을 누르시면 자동 로그아웃됩니다. '다시 로그인하자마자 곧바로' 탈퇴 버튼을 눌러주시면 정상 처리됩니다.");
                            auth.signOut().then(() => {
                                localStorage.removeItem('u2m_id');
                                localStorage.removeItem('u2m_pw');
                                window.location.href = 'login.html';
                            });
                        } else {
                            alert("탈퇴 처리 중 오류가 발생했습니다: " + error.message);
                        }
                    });
            }
        }

        function listenToFirebase() {
            database.ref('notice').on('value', (snapshot) => {
                const text = snapshot.val() || "";
                if (text.trim() !== "") {
                    document.getElementById('modalTitle').innerText = "📢 안내 말씀 드립니다";
                    document.getElementById('modalNoticeContent').innerText = text;
                    document.getElementById('noticeModal').style.display = 'flex';
                } else {
                    document.getElementById('noticeModal').style.display = 'none';
                }
            });

            const now = new Date();
            const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            database.ref('calendarQuotes/' + todayKey).on('value', (snapshot) => {
                const reservedText = snapshot.val();
                if (reservedText && reservedText.trim() !== "") {
                    document.getElementById('quote-header').innerText = "📌 오늘 자습실 알림:";
                    document.getElementById('quote-text').innerText = reservedText;
                    document.getElementById('quote-author').innerText = ""; 
                } else {
                    displayDefaultAdvice();
                }
            });

            database.ref('reminder').on('value', (snapshot) => {
                const text = snapshot.val() || "";
                const bar = document.getElementById('reminderBar');
                const txtEl = document.getElementById('reminderText');

                if (text.trim() !== "") {
                    txtEl.innerText = `⚠️ ${text} ⚠️\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0`;
                    bar.style.display = 'block';
                    const duration = Math.max(14, text.length * 0.45);
                    txtEl.style.animationDuration = `${duration}s`;
                } else {
                    bar.style.display = 'none';
                    txtEl.innerText = "";
                }
            });
        }

        window.onload = function() {
            checkUserAuth();
            startClock();
            listenToFirebase();
        };
    </script>
</body>
</html>
