    <script>
        let currentStudentData = null;

        let historyListeners = []; 
        let customAlertCallback = null;

        const SECRET_KEY = "u2mkst!";
        const NEIS_API_KEY = "19f78fd07bfb4243a6333e7bf4641bfc"; // 🚀 보내주신 나이스 인증키 탑재

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function showCustomAlert(content, title = "💡 알림", callback = null) {
            document.getElementById('customAlertTitle').innerText = title;
            document.getElementById('customAlertContent').innerText = content;
            customAlertCallback = callback;

        function closeCustomAlert() {
            closeModal('customAlertModal');
            if (customAlertCallback && typeof customAlertCallback === 'function') {

            }

        function decryptAES(cipherText) {
            if (!cipherText) return "";
            try {
                const cleanCipherText = cipherText.toString().trim();
                if (!cleanCipherText.startsWith("U2FsdGVkX1")) return cleanCipherText;
                const bytes = CryptoJS.AES.decrypt(cleanCipherText, SECRET_KEY);
                return bytes.toString(CryptoJS.enc.Utf8) || cleanCipherText; 
            } catch (e) {
                console.error("🚨 복호화 에러:", e);
                return cipherText; 
            }
        }

        function transmitBridgeCredentials() {
            if (!currentStudentData) return;
            try {
                const finalU2mPhone = decryptAES(currentStudentData.phone).replace(/[^0-9]/g, "");
                const decryptedMathflatPw = decryptAES(currentStudentData.mathflatPw);
                const finalStudentPhone = decryptAES(currentStudentData.studentPhone).replace(/[^0-9]/g, "");
                if (window.AndroidApp && typeof window.AndroidApp.loginToU2M === 'function') {
                    window.AndroidApp.loginToU2M(currentStudentData.u2mId, finalU2mPhone, decryptedMathflatPw, finalStudentPhone);
                }
            } catch (err) { console.error("❌ 브릿지 연동 실패:", err); }
        }

        function goToU2MWithCredentials() {
            transmitBridgeCredentials();
            setTimeout(() => { window.location.href = "https://www.u2math.co.kr/Login/Index"; }, 150);
        }

        function goToMathflatDirect() {
            transmitBridgeCredentials();
            setTimeout(() => { window.location.href = "https://student.mathflat.com/"; }, 150);

        function startClock() {

        // 명언 셔플 기기 (데이터 생략 - 기존 유지)
        const advices = [

            document.getElementById('quote-author').innerText = `- ${dailyData.author}${profileStr} -`;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD-F55blgdfzEygJ9-OUEqw22_EHKOhggg",
            authDomain: "ksthome-76889.firebaseapp.com",
            databaseURL: "https://ksthome-76889-default-rtdb.firebaseio.com",
            projectId: "ksthome-76889",
            storageBucket: "ksthome-76889.firebasestorage.app",
            messagingSenderId: "411945142173",
            appId: "1:411945142173:web:c6fdb499040b2a5a4f9174",
            measurementId: "G-72TJ0364MJ"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // 🚀 [추가] 나이스 Open API 서버에서 자동으로 학교 시험일정 긁어오는 엔진
        function fetchExamDateFromNeis(schoolName) {
            if (!schoolName) {
                renderDDayBadge(null);
                return;
            }

            // 1단계: 학교 기본정보 API 호출하여 교육청코드 및 학교코드 추출
            const schoolInfoUrl = `https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&SCHUL_NM=${encodeURIComponent(schoolName)}`;
            
            fetch(schoolInfoUrl)
                .then(res => res.json())
                .then(data => {
                    if (!data.schoolInfo) { renderDDayBadge(null); return; }
                    
                    const row = data.schoolInfo[1].row[0];
                    const officeCode = row.ATPT_OFCDC_SC_CODE; // 교육청코드
                    const schoolCode = row.SD_SCHUL_CODE;       // 학교코드
                    
                    // 2단계: 학사일정 조회 API 호출 (금년도 전체 분량)
                    const currentYear = new Date().getFullYear();
                    const fromYmd = `${currentYear}0301`;
                    const toYmd = `${currentYear + 1}0228`;
                    
                    const scheduleUrl = `https://open.neis.go.kr/hub/SchoolSchedule?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${officeCode}&SD_SCHUL_CODE=${schoolCode}&AA_FROM_YMD=${fromYmd}&AA_TO_YMD=${toYmd}&pSize=800`;
                    
                    return fetch(scheduleUrl);
                })
                .then(res => res ? res.json() : null)
                .then(data => {
                    if (!data || !data.SchoolSchedule) { renderDDayBadge(null); return; }
                    
                    const rows = data.SchoolSchedule[1].row;
                    
                    // 오늘 날짜 구하기 (YYYYMMDD 포맷)
                    const now = new Date();
                    const todayStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
                    
                    let upcomingExamDates = [];
                    
                    // 지필평가, 중간고사, 기말고사 키워드가 걸려있는 미래의 일정을 취합
                    rows.forEach(item => {
                        const eventName = item.EVENT_NM || "";
                        const eventDate = item.AA_YMD; 
                        
                        if (eventDate >= todayStr) {
                            if (eventName.includes("고사") || eventName.includes("중간") || eventName.includes("기말") || eventName.includes("지필")) {
                                upcomingExamDates.push(eventDate);
                            }
                        }
                    });
                    
                    if (upcomingExamDates.length > 0) {
                        upcomingExamDates.sort(); // 가장 빠른 날짜순 정렬
                        const closestDate = upcomingExamDates[0]; // YYYYMMDD
                        // YYYY-MM-DD 포맷 변환
                        const finalDateForm = `${closestDate.substring(0,4)}-${closestDate.substring(4,6)}-${closestDate.substring(6,8)}`;
                        renderDDayBadge(finalDateForm);
                    } else {
                        renderDDayBadge(null);
                    }
                })
                .catch(err => {
                    console.error("나이스 로딩 실패:", err);
                    renderDDayBadge(null);
                });
        }

        // 📅 D-Day 화면 렌더링 함수
        function renderDDayBadge(examDate) {
            const ddayZone = document.getElementById('dday-zone');
            if (!ddayZone) return;

            // 초등학생은 원천 차단
            if (currentStudentData && currentStudentData.schoolName && currentStudentData.schoolName.includes('초등')) {
                ddayZone.style.display = 'none';
                return;
            }

            if (!examDate) {
                ddayZone.innerText = "해당없음";
                ddayZone.style.color = "#7f8c8d";
                ddayZone.style.display = 'inline-block';
                return;
            }

            const targetDate = new Date(examDate + "T00:00:00");
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            targetDate.setHours(0, 0, 0, 0);

            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 0) {
                ddayZone.innerText = `시험 D-${String(diffDays).padStart(2, '0')}`;
                ddayZone.style.color = "#e74c3c";
                ddayZone.style.display = 'inline-block';
            } else if (diffDays === 0) {
                ddayZone.innerText = "시험 D-Day";
                ddayZone.style.color = "#e74c3c";
                ddayZone.style.display = 'inline-block';
            } else {
                ddayZone.innerText = "해당없음";
                ddayZone.style.color = "#7f8c8d";
                ddayZone.style.display = 'inline-block';
            }
        }

        function checkUserAuth() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    database.ref(`students/${user.uid}`).once('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            currentStudentData = data;
                            document.getElementById('msgFabBtn').style.display = 'flex';
                            document.getElementById('historyFabBtn').style.display = 'flex'; 

                            const rawName = data.name || data.studentName || data.userName;
                            const actualName = rawName ? decryptAES(rawName) : (user.displayName || "학생");
                            document.getElementById('welcome-message').innerText = `${actualName}님 반가워요!`;
                            
                            // 🚀 [연동 연계] 초등학생 검사 후 나이스 자동 추적기 구동
                            if (data.schoolName && !data.schoolName.includes('초등')) {
                                fetchExamDateFromNeis(data.schoolName);
                            } else {
                                renderDDayBadge(null);
                            }
                            
                            listenToTeacherNotes(user.uid);
                            startLiveChatHistory(user.uid); 
                        } else {
                            detachAllHistoryListeners();
                            if (noteListener) noteListener.off();
                            auth.signOut().then(() => {
                                localStorage.removeItem('u2m_id');
                                localStorage.removeItem('u2m_pw');
                                window.location.replace('login.html');
                            });
                        }
                    });
                } else {
                    window.location.replace('login.html'); 
                    detachAllHistoryListeners();
                }
            });
        }

        function logoutUser() { showModal('logoutCheckModal'); }

        function confirmLogoutAction() {
            closeModal('logoutCheckModal');
            auth.signOut().then(() => {
                localStorage.removeItem('u2m_id');
                localStorage.removeItem('u2m_pw');
                window.location.href = 'login.html';
            }).catch((error) => {
                showCustomAlert("로그아웃 중 오류가 발생했습니다: " + error.message, "❌ 에러");
            });
        }

        function openSendMessageModal() {
            document.getElementById('studentMsgInput').value = '';
            document.getElementById('sendMsgModal').style.display = 'flex';
        }
        function closeSendMessageModal() { document.getElementById('sendMsgModal').style.display = 'none'; }
        function openHistoryModal() {
            document.getElementById('historyModal').style.display = 'flex';
            const zoneEl = document.getElementById('messageHistoryZone');
            if(zoneEl) zoneEl.scrollTop = zoneEl.scrollHeight;
        }
        function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }

        function listenToTeacherNotes(uid) {
            noteListener = database.ref(`student_messages/${uid}`).orderByChild('read').equalTo(false).limitToLast(1);
            noteListener.on('child_added', (snapshot) => {
                const note = snapshot.val();
                if (note) {
                    let decryptedMsg = decryptAES(note.message);
                    if (decryptedMsg.startsWith("[답장완료] ")) { decryptedMsg = decryptedMsg.replace("[답장완료] ", ""); }
                    document.getElementById('modalTitle').innerText = "✉️ 선생님이 보낸 쪽지";
                    document.getElementById('modalNoticeContent').innerText = `[${note.teacher} 선생님]\n\n${decryptedMsg}`;
                    document.getElementById('noticeModal').style.display = 'flex';
                    database.ref(`student_messages/${uid}/${snapshot.key}/read`).set(true);
                }
            });
        }

        function startLiveChatHistory(studentUid) {
            detachAllHistoryListeners();
            let myQuestions = [];
            let teacherNotes = [];

            const qRef = database.ref('messages').orderByChild('studentUid').equalTo(studentUid);
            historyListeners.push({ ref: qRef, type: 'value' });
            qRef.on('value', (snapshot) => {
                myQuestions = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const val = child.val();
                        myQuestions.push({ id: child.key, isMine: true, ...val, message: decryptAES(val.message) });
                    });
                }
                renderCombinedChat(myQuestions, teacherNotes);
            });

            const nRef = database.ref(`student_messages/${studentUid}`);
            historyListeners.push({ ref: nRef, type: 'value' });
            nRef.on('value', (snapshot) => {
                teacherNotes = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const val = child.val();
                        teacherNotes.push({ id: child.key, isMine: false, ...val, message: decryptAES(val.message) });
                    });
                }
                renderCombinedChat(myQuestions, teacherNotes);
            });
        }

        function renderCombinedChat(questions, notes) {
            const zoneEl = document.getElementById('messageHistoryZone');
            if (!zoneEl) return;
            const combined = [...questions, ...notes].sort((a, b) => a.timestamp - b.timestamp);
            if (combined.length === 0) {
                zoneEl.innerHTML = '<div class="no-data">최근 주고받은 메시지가 없습니다.</div>';
                return;
            }
            zoneEl.innerHTML = '';
            combined.forEach(chat => {
                const date = new Date(chat.timestamp);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                const wrapper = document.createElement('div');
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.width = '100%';

                let rawMessage = chat.message || "";
                if (rawMessage.startsWith("[답장완료] ")) { rawMessage = rawMessage.replace("[답장완료] ", ""); }

                if (chat.isMine) {
                    wrapper.innerHTML = `<span class="chat-meta mine">내가 보낸 질문 (${timeStr})</span><div class="chat-bubble mine">${rawMessage}</div>`;
                } else {
                    wrapper.innerHTML = `<span class="chat-meta"><span class="teacher-name">👤 ${chat.teacher || '선생님'}</span> (${timeStr})</span><div class="chat-bubble teacher">${rawMessage}</div>`;
                }
                zoneEl.appendChild(wrapper);
            });
            zoneEl.scrollTop = zoneEl.scrollHeight;
        }

        function detachAllHistoryListeners() {
            historyListeners.forEach(item => item.ref.off(item.type));
            historyListeners = [];
        }

        function sendMessageToTeacher() {
            const msgInput = document.getElementById('studentMsgInput'); 
            const text = msgInput.value.trim();
            if (!text) { showCustomAlert('보낼 내용을 입력해 주세요.'); return; }
            if (!currentStudentData || !currentStudentData.teacher) { showCustomAlert('선생님 정보가 없습니다. 다시 로그인해 주세요.'); return; }
            const currentUser = auth.currentUser;
            if (!currentUser) { showCustomAlert('❌ 세션이 종료되었습니다. 다시 로그인해 주세요.'); return; }

            const rawName = currentStudentData.name || currentStudentData.studentName || currentStudentData.userName || '이름없음';
            const realName = decryptAES(rawName);
            let encryptedMessage = text;
            if (typeof CryptoJS !== 'undefined' && CryptoJS.AES) { encryptedMessage = CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }

            const msgData = {
                studentName: realName,
                u2mId: currentStudentData.u2mId || '',       
                studentUid: currentUser.uid,                 
                teacher: currentStudentData.teacher,
                message: encryptedMessage,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                read: false
            };

            database.ref('messages').push(msgData)
                .then(() => {
                    showCustomAlert(`${currentStudentData.teacher} 선생님께 메시지가 전송되었습니다.`, "✉️ 전송 완료");
                    msgInput.value = ''; 
                    closeSendMessageModal(); 
                })
                .catch(err => showCustomAlert('전송 실패: ' + err.message, "❌ 에러"));
        }

        function deleteAccount() {
            const user = auth.currentUser;
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('deletePhoneInput').value = ''; 
            showModal('deleteAccountModal');
        }

        function confirmDeleteAccountAction() {
            const user = auth.currentUser;
            if (!user) { window.location.href = 'login.html'; return; }
            const inputPhone = document.getElementById('deletePhoneInput').value.trim();
            if (!inputPhone) { showCustomAlert("번호 뒷자리 4글자를 기입해 주세요."); return; }

            if (currentStudentData && currentStudentData.phone) {
                const registeredPhone = decryptAES(currentStudentData.phone).toString();
                if (inputPhone !== registeredPhone.slice(-4)) {
                    showCustomAlert("❌ 번호가 일치하지 않습니다. 다시 확인해 주세요.");
                    return;
                }
            }
            closeModal('deleteAccountModal');
            const uid = user.uid;
            user.delete()
                .then(() => {
                    return database.ref(`students/${uid}`).remove().then(() => database.ref(`student_messages/${uid}`).remove());
                })
                .then(() => {
                    localStorage.removeItem('u2m_id');
                    localStorage.removeItem('u2m_pw');
                    showCustomAlert("회원탈퇴가 안전하게 처리되었습니다. 이용해 주셔서 감사합니다.", "회원탈퇴 완료", () => { window.location.href = 'login.html'; });
                })
                .catch((error) => {
                    if (error.code === 'auth/requires-recent-login') {
                        showCustomAlert("🔒 보안 재인증이 필요합니다. 안전을 위해 로그아웃 후 다시 로그인하여 진행해 주세요.", "인증 만료", () => {
                            auth.signOut().then(() => { window.location.href = 'login.html'; });
                        });
                    } else { showCustomAlert("탈퇴 처리 중 오류가 발생했습니다: " + error.message, "❌ 오류"); }
                });
        }

        function listenToFirebase() {
            database.ref('notice').on('value', (snapshot) => {
                const text = snapshot.val() || "";
                if (text.trim() !== "") {
                    document.getElementById('modalTitle').innerText = "📢 안내 말씀 드립니다";
                    document.getElementById('modalNoticeContent').innerText = text;
                    document.getElementById('noticeModal').style.display = 'flex';
                } else { document.getElementById('noticeModal').style.display = 'none'; }
            });

            const now = new Date();
            const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            database.ref('calendarQuotes/' + todayKey).on('value', (snapshot) => {
                const reservedText = snapshot.val();
                if (reservedText && reservedText.trim() !== "") {
                    document.getElementById('quote-header').innerText = "📌 오늘 자습실 알림:";
                    document.getElementById('quote-text').innerText = reservedText;
                    document.getElementById('quote-author').innerText = ""; 
                } else { displayDefaultAdvice(); }
            });

            database.ref('reminder').on('value', (snapshot) => {
                const text = snapshot.val() || "";
                const bar = document.getElementById('reminderBar');
                const txtEl = document.getElementById('reminderText');
                if (text.trim() !== "") {
                    txtEl.innerText = `⚠️ ${text} ⚠️\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0`;
                    bar.style.display = 'block';
                    const duration = Math.max(14, text.length * 0.45);
                    txtEl.style.animationDuration = `${duration}s`;
                } else {
                    bar.style.display = 'none';
                    txtEl.innerText = "";
                }
            });
        }

        window.onload = function() {
            checkUserAuth();
            startClock();
            listenToFirebase();
        };
    </script>
