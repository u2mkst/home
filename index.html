<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KST Home</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500; font-display: swap;
        }
        body {
            font-family: 'Paperozi', 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%), linear-gradient(25deg, #ecd5e3 0%, #cee5f2 60%, #e2daf0 100%);
            background-blend-mode: multiply; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #333; overflow-x: hidden; padding-bottom: 50px;
        }
        .container { width: 100%; max-width: 430px; padding: 20px 24px; text-align: center; box-sizing: border-box; }
        .clock-container {
            margin-bottom: 20px; background: rgba(255, 255, 255, 0.4);
            padding: 15px; border-radius: 20px; backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        }
        .clock-date { font-size: 0.9rem; color: #6c5ce7; font-weight: 600; margin-bottom: 2px; }
        .clock-time { font-size: 2.6rem; font-weight: 700; color: #2c3e50; letter-spacing: -1px; }
        
        .welcome-box {
            font-size: 1.1rem; font-weight: bold; color: #2c3e50;
            margin-bottom: 25px; background: rgba(255, 255, 255, 0.7);
            padding: 12px 20px; border-radius: 14px;
            box-shadow: 0 4px 12px rgba(149, 157, 165, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: inline-block; width: 100%; box-sizing: border-box;
        }

        .link-button {
            display: block; background-color: rgba(255, 255, 255, 0.9); color: #333333;
            text-decoration: none; padding: 18px 20px; margin-bottom: 16px; border-radius: 16px;
            font-size: 1.05rem; font-weight: 600; box-shadow: 0 8px 16px rgba(149, 157, 165, 0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .link-button:hover { transform: translateY(-4px); background-color: #6c5ce7; color: #ffffff; border-color: #6c5ce7; }
        .quote-box {
            background: rgba(255, 255, 255, 0.5); padding: 18px; border-radius: 16px;
            margin-top: 30px; font-size: 0.95rem; color: #4a5568; line-height: 1.5;
            border: 1px dashed rgba(108, 92, 231, 0.3); word-break: keep-all;
        }
        .quote-author { display: block; margin-top: 8px; font-size: 0.85rem; color: #718096; font-weight: bold; }
        .more-links { display: inline-block; margin-top: 35px; font-size: 0.82rem; color: #6c5ce7; text-decoration: none; font-weight: 600; }
        .footer { margin-top: 15px; font-size: 0.85rem; color: #8892b0; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: #ffffff; width: 90%; max-width: 380px; padding: 30px 24px;
            border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15); box-sizing: border-box;
        }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: #6c5ce7; margin-bottom: 15px; }
        .modal-content { font-size: 1rem; color: #4a5568; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; word-break: break-all; }
        .modal-btn { background-color: #6c5ce7; color: #ffffff; border: none; padding: 12px 30px; font-size: 0.95rem; font-weight: 600; border-radius: 12px; cursor: pointer; width: 100%; }
        .marquee-container {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(44, 62, 80, 0.95); color: #fff; padding: 10px 0;
            font-size: 0.9rem; font-weight: 600; overflow: hidden; z-index: 999;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1); backdrop-filter: blur(5px);
        }
        .marquee-text { display: inline-block; white-space: nowrap; padding-left: 100%; animation: marquee linear infinite; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="clock-container">
            <div id="clock-date" class="clock-date">0월 0일 0요일</div>
            <div id="clock-time" class="clock-time">00:00:00</div>
        </div>

        <div id="welcome-message" class="welcome-box">✨ 학생 정보를 불러오는 중...</div>

        <a href="#" onclick="goToU2M(event)" class="link-button">유투엠 바로가기</a>
        <a href="https://student.mathflat.com/login" class="link-button">매쓰플랫 바로가기</a>
                
        <div class="quote-box">
            💡 <b id="quote-header">오늘의 한마디:</b><br>
            <span id="quote-text">문구를 불러오는 중...</span>
            <span id="quote-author" class="quote-author"></span>
        </div>

        <a href="https://litt.ly/theu2m" target="_blank" class="more-links">KST가 만든 더 많은 것들</a>
        <div class="footer">© 2026 KST</div>
    </div>

    <div id="noticeModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">📢 안내 말씀 드립니다</div>
            <div id="modalNoticeContent" class="modal-content">공지사항을 불러오는 중...</div>
            <button class="modal-btn" onclick="document.getElementById('noticeModal').style.display='none'">확인</button>
        </div>
    </div>

    <div id="reminderBar" class="marquee-container">
        <div id="reminderText" class="marquee-text"></div>
    </div>

    <script>
        function startClock() {
            const dateEl = document.getElementById('clock-date');
            const timeEl = document.getElementById('clock-time');
            const weekDays = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            setInterval(() => {
                const now = new Date();
                dateEl.innerText = `${now.getMonth() + 1}월 ${now.getDate()}일 ${weekDays[now.getDay()]}`;
                timeEl.innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            }, 1000);
        }

        // [명언 데이터 생략 - 기존 113개 그대로 유지됨]
        const advices = [
            { author: "빌 게이츠", authorProfile: "마이크로소프트 창업자", message: "인생이란 결코 공평하지 않다. 이 사실에 익숙해져라." },
            { author: "김애란", authorProfile: "소설가", message: "두근두근 내 인생은 그렇게 지나간다." }
        ];

        function displayDefaultAdvice() {
            const today = new Date();
            const index = (today.getFullYear() + today.getMonth() + today.getDate()) % advices.length;
            const dailyData = advices[index];
            document.getElementById('quote-header').innerText = "오늘의 한마디:";
            document.getElementById('quote-text').innerText = `"${dailyData.message}"`;
            const profileStr = dailyData.authorProfile && dailyData.authorProfile !== "-" ? ` (${dailyData.authorProfile})` : "";
            document.getElementById('quote-author').innerText = `- ${dailyData.author}${profileStr} -`;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD-F55blgdfzEygJ9-OUEqw22_EHKOhggg",
            authDomain: "ksthome-76889.firebaseapp.com",
            databaseURL: "https://ksthome-76889-default-rtdb.firebaseio.com",
            projectId: "ksthome-76889",
            storageBucket: "ksthome-76889.firebasestorage.app",
            messagingSenderId: "411945142173",
            appId: "1:411945142173:web:c6fdb499040b2a5a4f9174",
            measurementId: "G-72TJ0364MJ"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // 🛡️ 로그인 여부 체크 및 환영 문구 띄우기
        function checkUserAuth() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    const studentName = user.displayName || "학생";
                    document.getElementById('welcome-message').innerText = `✨ ${studentName} 학생, 반가워요!`;
                } else {
                    // 로그인 안 되어 있으면 로그인 창으로 튕기기
                    window.location.href = './student-auth.html';
                }
            });
        }

        // 🚀 유투엠 자동 로그인 구현 핵심 함수
        function goToU2M(event) {
            event.preventDefault();

            // 로컬 저장소에서 로그인할 때 저장했던 진짜 아이디와 패스워드를 쏙 빼옵니다.
            const savedId = localStorage.getItem('u2m_id');
            const savedPw = localStorage.getItem('u2m_pw');

            if (!savedId || !savedPw) {
                alert("로그인 정보 동의가 만료되었습니다. 다시 로그인해 주세요.");
                window.location.href = './student-auth.html';
                return;
            }

            // 1. 먼저 유투엠 로그인 페이지를 새 창(새 탭)으로 엽니다.
            const u2mWindow = window.open('https://www.u2math.co.kr/Login/Index', '_blank');

            // 2. 새 창이 열리고 로드가 완료되면, 그 창의 입력 칸에 아이디와 비번을 주입합니다.
            u2mWindow.onload = function() {
                setTimeout(() => {
                    try {
                        // 유투엠 사이트 내부의 실제 ID 입력창 input 태그의 id나 name을 추적해 매칭시킵니다.
                        const idInput = u2mWindow.document.querySelector('input[type="text"]') || u2mWindow.document.getElementById('userId');
                        const pwInput = u2mWindow.document.querySelector('input[type="password"]') || u2mWindow.document.getElementById('userPw');
                        const loginBtn = u2mWindow.document.querySelector('button[type="submit"]') || u2mWindow.document.querySelector('.btn_login');

                        if(idInput && pwInput) {
                            idInput.value = savedId;
                            pwInput.value = savedPw;
                            
                            // 자동으로 로그인 버튼까지 클릭 처리
                            if(loginBtn) loginBtn.click();
                        }
                    } catch (e) {
                        console.log("크로스 도메인 보안 정책으로 직접 주입이 막힌 경우, 가이드 창을 대안으로 띄웁니다.");
                    }
                }, 1000); // 창이 안정적으로 열릴 때까지 1초 대기 후 실행
            };
        }

        function listenToFirebase() {
            database.ref('notice').on('value', (snapshot) => {
                const text = snapshot.val() || "";
                if (text.trim() !== "") {
                    document.getElementById('modalNoticeContent').innerText = text;
                    document.getElementById('noticeModal').style.display = 'flex';
                } else {
                    document.getElementById('noticeModal').style.display = 'none';
                }
            });

            const now = new Date();
            const todayKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            database.ref('calendarQuotes/' + todayKey).on('value', (snapshot) => {
                const reservedText = snapshot.val();
                if (reservedText && reservedText.trim() !== "") {
                    document.getElementById('quote-header').innerText = "📌 오늘 자습실 알림:";
                    document.getElementById('quote-text').innerText = reservedText;
                    document.getElementById('quote-author').innerText = ""; 
                } else {
                    displayDefaultAdvice();
                }
            });

            database.ref('reminder').on('value', (snapshot) => {
                const text = snapshot.val() || "";
                const bar = document.getElementById('reminderBar');
                const txtEl = document.getElementById('reminderText');

                if (text.trim() !== "") {
                    txtEl.innerText = `⚠️ ${text} ⚠️\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0`;
                    bar.style.display = 'block';
                    const duration = Math.max(14, text.length * 0.45);
                    txtEl.style.animationDuration = `${duration}s`;
                } else {
                    bar.style.display = 'none';
                    txtEl.innerText = "";
                }
            });
        }

        window.onload = function() {
            checkUserAuth();
            startClock();
            listenToFirebase();
        };
    </script>
</body>
</html>
